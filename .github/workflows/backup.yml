name: Supabase Backup
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# .github/workflows/backup.yml

on:
  # Permite rodar o backup manualmente pela interface do GitHub
  workflow_dispatch:
  # Agenda o backup para rodar todos os dias à meia-noite (UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Prepara o ambiente do GitHub Actions
      - uses: actions/checkout@v4
      # 2. Instala a ferramenta de linha de comando do Supabase
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. Cria uma pasta para guardar os backups
      - name: Criar pasta de backup
        run: mkdir -p ./backups

      # 4. Exporta as Roles (permissões)
      - name: Backup de Roles
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f ./backups/roles.sql --role-only

      # 5. Exporta o Schema (estrutura do banco)
      - name: Backup de Schema
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f ./backups/schema.sql

      # 6. Exporta os Data (dados das tabelas)
      - name: Backup de Dados
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f ./backups/data.sql --data-only --use-copy

      # 7. Salva os arquivos de backup no repositório
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backup automático do banco de dados"
          branch: ${{ github.head_ref }}
          file_pattern: './backups/*.sql'