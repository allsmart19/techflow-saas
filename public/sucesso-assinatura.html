<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Assinatura Confirmada!</title>
  <meta http-equiv="refresh" content="3; url=/assinatura">
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f3f4f6;
    }
    .card {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .check {
      font-size: 64px;
      color: #22c55e;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Assinatura Confirmada!</h1>
    <p>Sua assinatura foi ativada com sucesso.</p>
    <button onclick="window.location.href='/assinatura'">Voltar</button>
  </div>
</body>
</html>
